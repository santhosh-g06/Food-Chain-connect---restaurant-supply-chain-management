<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FoodChain Connect</title>

  <!-- React & Babel (CDN — no Node.js needed) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">

  <style>
    /* ============================================================
       DESIGN SYSTEM — FoodChain Connect
       Theme: Organic warmth meets modern utility
       Palette: Deep forest green + warm saffron + cream
    ============================================================ */
    :root {
      --forest:    #1a3a2a;
      --leaf:      #2d6a4f;
      --mint:      #52b788;
      --saffron:   #f4a261;
      --amber:     #e76f51;
      --cream:     #fdf8f0;
      --parchment: #f0e8d8;
      --ink:       #1c1c1c;
      --muted:     #6b7280;
      --urgent:    #dc2626;
      --success:   #16a34a;
      --card-bg:   #ffffff;
      --border:    #e5ddd0;
      --shadow:    0 4px 24px rgba(26,58,42,0.10);
      --shadow-lg: 0 12px 48px rgba(26,58,42,0.18);
      --radius:    14px;
      --font-head: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-body);
      background: var(--cream);
      color: var(--ink);
      min-height: 100vh;
    }

    /* ---- NAV ---- */
    .nav {
      background: var(--forest);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 16px rgba(0,0,0,0.25);
    }
    .nav-brand {
      font-family: var(--font-head);
      font-size: 1.4rem;
      font-weight: 800;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 10px;
      letter-spacing: -0.02em;
    }
    .nav-brand span { color: var(--saffron); }
    .nav-logo { font-size: 1.5rem; }
    .nav-tabs {
      display: flex;
      gap: 4px;
      background: rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 4px;
    }
    .nav-tab {
      padding: 8px 18px;
      border-radius: 8px;
      border: none;
      background: transparent;
      color: rgba(255,255,255,0.65);
      font-family: var(--font-body);
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .nav-tab:hover { color: #fff; background: rgba(255,255,255,0.12); }
    .nav-tab.active {
      background: var(--saffron);
      color: var(--forest);
      font-weight: 700;
    }
    .nav-status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.6);
    }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #6b7280;
      animation: pulse-gray 2s infinite;
    }
    .status-dot.online { background: var(--mint); animation: pulse-green 2s infinite; }
    @keyframes pulse-green {
      0%,100% { box-shadow: 0 0 0 0 rgba(82,183,136,0.4); }
      50% { box-shadow: 0 0 0 5px rgba(82,183,136,0); }
    }
    @keyframes pulse-gray {
      0%,100% { opacity: 1; } 50% { opacity: 0.4; }
    }

    /* ---- LAYOUT ---- */
    .page { max-width: 1100px; margin: 0 auto; padding: 2.5rem 1.5rem; animation: fadeUp 0.4s ease; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ---- HERO HEADER ---- */
    .page-header {
      margin-bottom: 2.5rem;
    }
    .page-header h1 {
      font-family: var(--font-head);
      font-size: 2.2rem;
      font-weight: 800;
      color: var(--forest);
      letter-spacing: -0.03em;
      line-height: 1.1;
    }
    .page-header h1 em {
      font-style: normal;
      color: var(--mint);
    }
    .page-header p {
      margin-top: 0.5rem;
      color: var(--muted);
      font-size: 1.05rem;
      font-weight: 300;
    }

    /* ---- CARDS ---- */
    .card {
      background: var(--card-bg);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      padding: 1.75rem;
      transition: box-shadow 0.25s ease, transform 0.25s ease;
    }
    .card:hover { box-shadow: var(--shadow-lg); transform: translateY(-2px); }
    .card-title {
      font-family: var(--font-head);
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--forest);
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ---- FORM ---- */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group.full { grid-column: 1 / -1; }
    label {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--forest);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    input, select {
      padding: 10px 14px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-family: var(--font-body);
      font-size: 0.95rem;
      background: var(--cream);
      color: var(--ink);
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }
    input:focus, select:focus {
      border-color: var(--mint);
      box-shadow: 0 0 0 3px rgba(82,183,136,0.18);
      background: #fff;
    }
    input::placeholder { color: #b0a898; }

    /* ---- BUTTONS ---- */
    .btn {
      padding: 11px 22px;
      border-radius: 9px;
      border: none;
      font-family: var(--font-body);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      gap: 7px;
    }
    .btn:disabled { opacity: 0.55; cursor: not-allowed; }
    .btn-primary {
      background: var(--forest);
      color: #fff;
    }
    .btn-primary:hover:not(:disabled) { background: var(--leaf); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(26,58,42,0.25); }
    .btn-accent {
      background: var(--saffron);
      color: var(--forest);
    }
    .btn-accent:hover:not(:disabled) { background: var(--amber); color: #fff; transform: translateY(-1px); }
    .btn-ghost {
      background: transparent;
      color: var(--leaf);
      border: 1.5px solid var(--border);
    }
    .btn-ghost:hover:not(:disabled) { border-color: var(--mint); background: rgba(82,183,136,0.08); }
    .btn-danger {
      background: #fef2f2;
      color: var(--urgent);
      border: 1.5px solid #fecaca;
    }
    .btn-danger:hover:not(:disabled) { background: var(--urgent); color: #fff; }

    /* ---- FOOD ITEM CARDS ---- */
    .food-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.25rem;
    }
    .food-card {
      background: var(--card-bg);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: hidden;
      transition: all 0.25s ease;
    }
    .food-card:hover { box-shadow: var(--shadow-lg); transform: translateY(-3px); }
    .food-card-header {
      padding: 1.25rem 1.25rem 0;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }
    .food-name {
      font-family: var(--font-head);
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--forest);
    }
    .food-card-body { padding: 0.75rem 1.25rem 1.25rem; }
    .food-meta {
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: 0.88rem;
      color: var(--muted);
    }
    .food-meta-row { display: flex; align-items: center; gap: 7px; }
    .food-meta-row span:first-child { font-size: 1rem; }

    /* ---- BADGES ---- */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      white-space: nowrap;
    }
    .badge-available { background: #dcfce7; color: var(--success); }
    .badge-urgent    { background: #fef2f2; color: var(--urgent); border: 1px solid #fecaca; animation: urgentPulse 2s infinite; }
    .badge-claimed   { background: #fef9c3; color: #854d0e; }
    .badge-donated   { background: #e0f2fe; color: #0369a1; }

    @keyframes urgentPulse {
      0%,100% { box-shadow: none; }
      50% { box-shadow: 0 0 8px rgba(220,38,38,0.3); }
    }

    /* ---- EXPIRY BAR ---- */
    .expiry-bar-wrap { margin-top: 10px; }
    .expiry-label { font-size: 0.78rem; color: var(--muted); margin-bottom: 4px; }
    .expiry-bar {
      height: 5px;
      border-radius: 3px;
      background: #e5e7eb;
      overflow: hidden;
    }
    .expiry-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.5s ease;
    }
    .expiry-fill.safe    { background: var(--mint); }
    .expiry-fill.warning { background: var(--saffron); }
    .expiry-fill.danger  { background: var(--urgent); }

    /* ---- STATS GRID ---- */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .stat-card {
      background: var(--card-bg);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .stat-icon { font-size: 2rem; line-height: 1; }
    .stat-value {
      font-family: var(--font-head);
      font-size: 2.5rem;
      font-weight: 800;
      color: var(--forest);
      line-height: 1;
    }
    .stat-label { font-size: 0.85rem; color: var(--muted); font-weight: 400; }

    /* ---- TOAST ---- */
    .toast-wrap {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      z-index: 999;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
    }
    .toast {
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 500;
      box-shadow: var(--shadow-lg);
      animation: toastIn 0.3s ease;
      pointer-events: all;
    }
    .toast-success { background: var(--forest); color: #fff; }
    .toast-error   { background: var(--urgent);  color: #fff; }
    .toast-info    { background: var(--leaf);     color: #fff; }
    @keyframes toastIn {
      from { opacity: 0; transform: translateX(60px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    /* ---- EMPTY STATE ---- */
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--muted);
    }
    .empty-icon { font-size: 3.5rem; margin-bottom: 1rem; }
    .empty-state h3 { font-family: var(--font-head); font-size: 1.3rem; color: var(--forest); margin-bottom: 0.5rem; }

    /* ---- LOADING ---- */
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--mint);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 3rem auto;
      display: block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ---- SECTION TABS ---- */
    .section-tabs {
      display: flex;
      gap: 0;
      border-bottom: 2px solid var(--border);
      margin-bottom: 1.75rem;
    }
    .section-tab {
      padding: 10px 20px;
      background: none;
      border: none;
      font-family: var(--font-body);
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: all 0.2s;
    }
    .section-tab.active { color: var(--forest); font-weight: 700; border-bottom-color: var(--mint); }
    .section-tab:hover:not(.active) { color: var(--ink); }

    /* ---- API CONFIG BANNER ---- */
    .config-banner {
      background: linear-gradient(135deg, #fff8f0 0%, #fef3e2 100%);
      border: 1.5px solid #fcd9a0;
      border-radius: 12px;
      padding: 1rem 1.25rem;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.88rem;
      color: #92400e;
    }
    .config-banner strong { font-weight: 700; }
    .config-banner code {
      background: rgba(0,0,0,0.07);
      padding: 1px 6px;
      border-radius: 4px;
      font-family: monospace;
      font-size: 0.85rem;
    }

    /* ---- DIVIDER ---- */
    .divider { height: 1px; background: var(--border); margin: 1.5rem 0; }

    /* ---- CLAIM MODAL ---- */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(4px);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .modal {
      background: var(--card-bg);
      border-radius: 18px;
      padding: 2rem;
      max-width: 420px;
      width: 90%;
      box-shadow: var(--shadow-lg);
      animation: slideUp 0.3s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(30px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
    .modal h2 {
      font-family: var(--font-head);
      font-size: 1.35rem;
      color: var(--forest);
      margin-bottom: 0.5rem;
    }
    .modal p { color: var(--muted); font-size: 0.9rem; margin-bottom: 1.25rem; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 1.5rem; }

    /* ---- RESPONSIVE ---- */
    @media (max-width: 640px) {
      .form-grid { grid-template-columns: 1fr; }
      .form-group.full { grid-column: 1; }
      .nav-brand { font-size: 1.1rem; }
      .nav-tab { padding: 6px 10px; font-size: 0.8rem; }
      .page { padding: 1.5rem 1rem; }
    }
  </style>
</head>
<body>

<div id="root"></div>

<script type="text/babel">
  const { useState, useEffect, useCallback, useRef } = React;

  // ============================================================
  // CONFIG — Change this to your Spring Boot server URL
  // ============================================================
  const API_BASE = 'http://localhost:8080/api/food';

  // ============================================================
  // API SERVICE
  // ============================================================
  const api = {
    async get(path) {
      const res = await fetch(`${API_BASE}${path}`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return res.json();
    },
    async post(path, body) {
      const res = await fetch(`${API_BASE}${path}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return res.json();
    },
    async patch(path, body) {
      const res = await fetch(`${API_BASE}${path}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return res.json();
    },
  };

  // ============================================================
  // HELPERS
  // ============================================================
  function formatDate(dt) {
    if (!dt) return '—';
    return new Date(dt).toLocaleString('en-IN', {
      day: '2-digit', month: 'short', year: 'numeric',
      hour: '2-digit', minute: '2-digit',
    });
  }

  function hoursUntilExpiry(expiryDate) {
    if (!expiryDate) return 9999;
    return (new Date(expiryDate) - Date.now()) / 3600000;
  }

  function expiryPercent(expiryDate) {
    // 0% = expired, 100% = very fresh (≥72h)
    const h = hoursUntilExpiry(expiryDate);
    if (h <= 0) return 0;
    return Math.min(100, (h / 72) * 100);
  }

  function expiryFillClass(expiryDate) {
    const h = hoursUntilExpiry(expiryDate);
    if (h <= 0)  return 'danger';
    if (h <= 12) return 'danger';
    if (h <= 24) return 'warning';
    return 'safe';
  }

  function getBadge(item) {
    const h = hoursUntilExpiry(item.expiryDate);
    if (item.status === 'CLAIMED')  return { cls: 'badge-claimed',   label: '📦 Claimed' };
    if (item.status === 'DONATED')  return { cls: 'badge-donated',   label: '✅ Donated' };
    if (h <= 12 && h > 0)           return { cls: 'badge-urgent',    label: '🔥 Urgent' };
    return                                   { cls: 'badge-available', label: '✅ Available' };
  }

  // ============================================================
  // TOAST SYSTEM
  // ============================================================
  function useToasts() {
    const [toasts, setToasts] = useState([]);
    const add = useCallback((msg, type = 'info') => {
      const id = Date.now();
      setToasts(t => [...t, { id, msg, type }]);
      setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 3500);
    }, []);
    return { toasts, add };
  }

  function ToastZone({ toasts }) {
    return (
      <div className="toast-wrap">
        {toasts.map(t => (
          <div key={t.id} className={`toast toast-${t.type}`}>{t.msg}</div>
        ))}
      </div>
    );
  }

  // ============================================================
  // FOOD ITEM CARD
  // ============================================================
  function FoodCard({ item, onClaim, showClaim = false }) {
    const badge = getBadge(item);
    const pct   = expiryPercent(item.expiryDate);
    const cls   = expiryFillClass(item.expiryDate);
    const hrs   = hoursUntilExpiry(item.expiryDate);
    const hrsLabel = hrs <= 0 ? 'Expired' :
                     hrs < 1  ? `${Math.round(hrs * 60)}m left` :
                     hrs < 24 ? `${hrs.toFixed(1)}h left` :
                     `${Math.floor(hrs / 24)}d left`;

    return (
      <div className="food-card">
        <div className="food-card-header">
          <div className="food-name">🥡 {item.name}</div>
          <span className={`badge ${badge.cls}`}>{badge.label}</span>
        </div>
        <div className="food-card-body">
          <div className="food-meta">
            <div className="food-meta-row">
              <span>⚖️</span>
              <span><strong>{item.quantity}</strong> {item.unit}</span>
            </div>
            <div className="food-meta-row">
              <span>🕐</span>
              <span>Expires: {formatDate(item.expiryDate)}</span>
            </div>
            <div className="food-meta-row">
              <span>🆔</span>
              <span style={{fontSize:'0.78rem', color:'#b0a898'}}>ID #{item.id}</span>
            </div>
          </div>

          <div className="expiry-bar-wrap">
            <div className="expiry-label">{hrsLabel}</div>
            <div className="expiry-bar">
              <div
                className={`expiry-fill ${cls}`}
                style={{ width: `${pct}%` }}
              />
            </div>
          </div>

          {showClaim && item.status === 'AVAILABLE' && (
            <div style={{marginTop:'1rem'}}>
              <button
                className="btn btn-accent"
                style={{width:'100%'}}
                onClick={() => onClaim(item)}
              >
                📋 Claim This Donation
              </button>
            </div>
          )}
        </div>
      </div>
    );
  }

  // ============================================================
  // CLAIM MODAL
  // ============================================================
  function ClaimModal({ item, onConfirm, onClose }) {
    const [ngoName, setNgoName] = useState('');
    const [loading, setLoading] = useState(false);

    async function handleConfirm() {
      if (!ngoName.trim()) return;
      setLoading(true);
      await onConfirm(item, ngoName.trim());
      setLoading(false);
    }

    return (
      <div className="modal-overlay" onClick={onClose}>
        <div className="modal" onClick={e => e.stopPropagation()}>
          <h2>Claim Donation</h2>
          <p>You are claiming <strong>{item.name}</strong> ({item.quantity} {item.unit}). Enter your NGO name to confirm.</p>
          <div className="form-group">
            <label>NGO / Organisation Name</label>
            <input
              value={ngoName}
              onChange={e => setNgoName(e.target.value)}
              placeholder="e.g. Chennai Food Bank"
              autoFocus
            />
          </div>
          <div className="modal-actions">
            <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
            <button
              className="btn btn-accent"
              onClick={handleConfirm}
              disabled={!ngoName.trim() || loading}
            >
              {loading ? '⏳ Claiming…' : '✅ Confirm Claim'}
            </button>
          </div>
        </div>
      </div>
    );
  }

  // ============================================================
  // PAGE: RESTAURANT (Add Food)
  // ============================================================
  function RestaurantPage({ toast, onApiStatus }) {
    const [form, setForm]     = useState({ name:'', quantity:'', unit:'kg', expiryDate:'' });
    const [loading, setLoading] = useState(false);
    const [recent, setRecent]  = useState([]);

    // Minimum datetime = now (can't set past expiry)
    const minDate = new Date(Date.now() + 60000).toISOString().slice(0,16);

    function setField(k, v) { setForm(f => ({ ...f, [k]: v })); }

    async function handleSubmit() {
      const { name, quantity, unit, expiryDate } = form;
      if (!name.trim() || !quantity || !expiryDate) {
        toast('Please fill all fields.', 'error'); return;
      }
      setLoading(true);
      try {
        const payload = {
          name: name.trim(),
          quantity: parseFloat(quantity),
          unit,
          expiryDate: new Date(expiryDate).toISOString(),
          status: 'AVAILABLE',
        };
        const saved = await api.post('/add', payload);
        toast(`✅ "${saved.name}" added successfully!`, 'success');
        setForm({ name:'', quantity:'', unit:'kg', expiryDate:'' });
        setRecent(r => [saved, ...r].slice(0, 5));
        onApiStatus(true);
      } catch(e) {
        toast('❌ Could not reach backend. Is Spring Boot running?', 'error');
        onApiStatus(false);
      } finally { setLoading(false); }
    }

    return (
      <div className="page">
        <div className="page-header">
          <h1>🍽️ Restaurant <em>Donate</em></h1>
          <p>List surplus food for NGOs to claim before it goes to waste.</p>
        </div>

        <ApiConfigBanner />

        <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'1.5rem', alignItems:'start'}}>
          {/* Form */}
          <div className="card">
            <div className="card-title">📝 Add a Food Donation</div>
            <div className="form-grid">
              <div className="form-group full">
                <label>Food Name</label>
                <input value={form.name} onChange={e=>setField('name',e.target.value)}
                  placeholder="e.g. Biryani, Idli packets" />
              </div>
              <div className="form-group">
                <label>Quantity</label>
                <input type="number" min="0.1" step="0.1"
                  value={form.quantity} onChange={e=>setField('quantity',e.target.value)}
                  placeholder="e.g. 5" />
              </div>
              <div className="form-group">
                <label>Unit</label>
                <select value={form.unit} onChange={e=>setField('unit',e.target.value)}>
                  <option value="kg">kg</option>
                  <option value="packets">Packets</option>
                  <option value="portions">Portions</option>
                  <option value="litres">Litres</option>
                  <option value="boxes">Boxes</option>
                </select>
              </div>
              <div className="form-group full">
                <label>Expiry Date & Time</label>
                <input type="datetime-local" min={minDate}
                  value={form.expiryDate} onChange={e=>setField('expiryDate',e.target.value)} />
              </div>
            </div>
            <div style={{marginTop:'1.25rem'}}>
              <button className="btn btn-primary" onClick={handleSubmit} disabled={loading}
                style={{width:'100%', padding:'13px', justifyContent:'center'}}>
                {loading ? '⏳ Submitting…' : '🚀 List for Donation'}
              </button>
            </div>
          </div>

          {/* Quick info */}
          <div style={{display:'flex', flexDirection:'column', gap:'1rem'}}>
            <div className="card" style={{background:'linear-gradient(135deg,#f0fdf4,#dcfce7)', border:'1.5px solid #86efac'}}>
              <div className="card-title" style={{color:'#166534'}}>💡 How It Works</div>
              <div style={{fontSize:'0.9rem', color:'#166534', lineHeight:1.7}}>
                <div>1️⃣ &nbsp;You list surplus food with expiry time</div>
                <div>2️⃣ &nbsp;NGOs see it live and can claim it</div>
                <div>3️⃣ &nbsp;🔥 Items expiring in &lt;12h appear as <strong>Urgent</strong></div>
                <div>4️⃣ &nbsp;Food reaches people before it spoils</div>
              </div>
            </div>

            {recent.length > 0 && (
              <div className="card">
                <div className="card-title">⏱ Recently Added</div>
                <div style={{display:'flex', flexDirection:'column', gap:'8px'}}>
                  {recent.map(r => (
                    <div key={r.id} style={{fontSize:'0.88rem', display:'flex', justifyContent:'space-between', padding:'8px', background:'var(--cream)', borderRadius:'7px'}}>
                      <span>🥡 {r.name}</span>
                      <span style={{color:'var(--muted)'}}>{r.quantity} {r.unit}</span>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>
        </div>
      </div>
    );
  }

  // ============================================================
  // PAGE: NGO (Browse & Claim Food)
  // ============================================================
  function NgoPage({ toast, onApiStatus }) {
    const [tab, setTab]         = useState('all');
    const [allFood, setAllFood] = useState([]);
    const [urgent, setUrgent]   = useState([]);
    const [loading, setLoading] = useState(true);
    const [claiming, setClaiming] = useState(null); // item being claimed

    const fetchData = useCallback(async () => {
      setLoading(true);
      try {
        const [all, urg] = await Promise.all([
          api.get('/available'),
          api.get('/urgent'),
        ]);
        setAllFood(all);
        setUrgent(urg);
        onApiStatus(true);
      } catch (e) {
        toast('❌ Could not load food listings. Check backend.', 'error');
        onApiStatus(false);
      } finally { setLoading(false); }
    }, []);

    useEffect(() => { fetchData(); }, [fetchData]);

    async function handleClaim(item, ngoName) {
      try {
        // PATCH status to CLAIMED
        await api.patch(`/${item.id}/status`, { status: 'CLAIMED', claimedBy: ngoName });
        toast(`✅ "${item.name}" claimed by ${ngoName}!`, 'success');
        setClaiming(null);
        fetchData();
      } catch(e) {
        // If PATCH not implemented yet, update locally and inform
        toast(`📝 Claim recorded locally (backend PATCH endpoint coming soon)`, 'info');
        setClaiming(null);
        setAllFood(f => f.map(x => x.id===item.id ? {...x, status:'CLAIMED'} : x));
        setUrgent(f => f.filter(x => x.id!==item.id));
      }
    }

    const displayItems = tab === 'urgent' ? urgent : allFood;

    return (
      <div className="page">
        <div className="page-header">
          <h1>🌱 NGO <em>Dashboard</em></h1>
          <p>Browse available donations. Urgent items expire within 12 hours.</p>
        </div>

        <ApiConfigBanner />

        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'1.25rem', flexWrap:'wrap', gap:'10px'}}>
          <div className="section-tabs" style={{marginBottom:0, borderBottom:'none'}}>
            <button className={`section-tab ${tab==='all'?'active':''}`} onClick={()=>setTab('all')}>
              All Available ({allFood.length})
            </button>
            <button className={`section-tab ${tab==='urgent'?'active':''}`} onClick={()=>setTab('urgent')}>
              🔥 Urgent ({urgent.length})
            </button>
          </div>
          <button className="btn btn-ghost" onClick={fetchData} disabled={loading}>
            🔄 Refresh
          </button>
        </div>

        {tab === 'urgent' && urgent.length > 0 && (
          <div style={{background:'#fef2f2', border:'1.5px solid #fecaca', borderRadius:'10px', padding:'12px 16px', marginBottom:'1.25rem', fontSize:'0.88rem', color:'#991b1b', display:'flex', gap:'8px', alignItems:'center'}}>
            <span style={{fontSize:'1.2rem'}}>⚠️</span>
            <span><strong>{urgent.length} item{urgent.length>1?'s':''}</strong> will expire within 12 hours. Claim now to prevent waste!</span>
          </div>
        )}

        {loading ? (
          <div className="spinner" />
        ) : displayItems.length === 0 ? (
          <div className="empty-state">
            <div className="empty-icon">{tab==='urgent'?'✅':'🍃'}</div>
            <h3>{tab==='urgent' ? 'No urgent items right now' : 'No available food'}</h3>
            <p>{tab==='urgent' ? 'All food has a comfortable expiry window.' : 'Check back soon — restaurants update listings regularly.'}</p>
          </div>
        ) : (
          <div className="food-grid">
            {displayItems.map(item => (
              <FoodCard key={item.id} item={item} showClaim onClaim={setClaiming} />
            ))}
          </div>
        )}

        {claiming && (
          <ClaimModal
            item={claiming}
            onConfirm={handleClaim}
            onClose={() => setClaiming(null)}
          />
        )}
      </div>
    );
  }

  // ============================================================
  // PAGE: ADMIN DASHBOARD
  // ============================================================
  function AdminPage({ toast, onApiStatus }) {
    const [allFood, setAllFood] = useState([]);
    const [urgent, setUrgent]   = useState([]);
    const [loading, setLoading] = useState(true);

    const fetchData = useCallback(async () => {
      setLoading(true);
      try {
        const [all, urg] = await Promise.all([
          api.get('/available'),
          api.get('/urgent'),
        ]);
        setAllFood(all);
        setUrgent(urg);
        onApiStatus(true);
      } catch (e) {
        toast('❌ Backend not reachable. Is Spring Boot running?', 'error');
        onApiStatus(false);
      } finally { setLoading(false); }
    }, []);

    useEffect(() => { fetchData(); }, [fetchData]);

    const claimed   = allFood.filter(i => i.status === 'CLAIMED').length;
    const available = allFood.filter(i => i.status === 'AVAILABLE').length;
    const donated   = allFood.filter(i => i.status === 'DONATED').length;
    const total     = allFood.length;

    return (
      <div className="page">
        <div className="page-header">
          <h1>📊 Admin <em>Overview</em></h1>
          <p>System-wide statistics and all food listings.</p>
        </div>

        <ApiConfigBanner />

        {loading ? <div className="spinner" /> : (
          <>
            <div className="stats-grid">
              <div className="stat-card">
                <div className="stat-icon">📋</div>
                <div className="stat-value">{total}</div>
                <div className="stat-label">Total Listings</div>
              </div>
              <div className="stat-card" style={{borderColor:'#86efac'}}>
                <div className="stat-icon">✅</div>
                <div className="stat-value" style={{color:'var(--success)'}}>{available}</div>
                <div className="stat-label">Available Now</div>
              </div>
              <div className="stat-card" style={{borderColor:'#fcd9a0'}}>
                <div className="stat-icon">📦</div>
                <div className="stat-value" style={{color:'#d97706'}}>{claimed}</div>
                <div className="stat-label">Claimed</div>
              </div>
              <div className="stat-card" style={{borderColor:'#fecaca'}}>
                <div className="stat-icon">🔥</div>
                <div className="stat-value" style={{color:'var(--urgent)'}}>{urgent.length}</div>
                <div className="stat-label">Urgent (&lt;12h)</div>
              </div>
            </div>

            {/* Waste prevention meter */}
            {total > 0 && (
              <div className="card" style={{marginBottom:'1.5rem'}}>
                <div className="card-title">♻️ Waste Prevention Rate</div>
                <div style={{fontSize:'0.88rem', color:'var(--muted)', marginBottom:'10px'}}>
                  Percentage of donations successfully claimed or donated
                </div>
                <div className="expiry-bar" style={{height:'12px', borderRadius:'6px'}}>
                  <div
                    className="expiry-fill safe"
                    style={{width: `${Math.round(((claimed+donated)/total)*100)}%`, height:'100%', borderRadius:'6px'}}
                  />
                </div>
                <div style={{marginTop:'6px', fontSize:'0.9rem', fontWeight:700, color:'var(--leaf)'}}>
                  {Math.round(((claimed+donated)/total)*100)}% utilised
                </div>
              </div>
            )}

            <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'1.25rem'}}>
              <div style={{fontFamily:'var(--font-head)', fontWeight:700, fontSize:'1.1rem', color:'var(--forest)'}}>
                All Listings
              </div>
              <button className="btn btn-ghost" onClick={fetchData}>🔄 Refresh</button>
            </div>

            {allFood.length === 0 ? (
              <div className="empty-state">
                <div className="empty-icon">🍃</div>
                <h3>No listings yet</h3>
                <p>Once restaurants add donations, they'll appear here.</p>
              </div>
            ) : (
              <div className="food-grid">
                {allFood.map(item => (
                  <FoodCard key={item.id} item={item} />
                ))}
              </div>
            )}
          </>
        )}
      </div>
    );
  }

  // ============================================================
  // API CONFIG BANNER
  // ============================================================
  function ApiConfigBanner() {
    return (
      <div className="config-banner">
        <span>⚙️</span>
        <span>
          <strong>Backend:</strong> Make sure your Spring Boot app is running on <code>localhost:8080</code>. 
          To change the URL, edit <code>API_BASE</code> at the top of this file.
        </span>
      </div>
    );
  }

  // ============================================================
  // ROOT APP
  // ============================================================
  function App() {
    const [page, setPage]         = useState('restaurant');
    const [apiOnline, setApiOnline] = useState(null);
    const { toasts, add: toast }  = useToasts();

    return (
      <>
        {/* NAV */}
        <nav className="nav">
          <div className="nav-brand">
            <span className="nav-logo">🌾</span>
            FoodChain <span>Connect</span>
          </div>
          <div className="nav-tabs">
            {[
              { id:'restaurant', label:'🍽️ Restaurant' },
              { id:'ngo',        label:'🌱 NGO'        },
              { id:'admin',      label:'📊 Admin'      },
            ].map(t => (
              <button
                key={t.id}
                className={`nav-tab ${page===t.id?'active':''}`}
                onClick={() => setPage(t.id)}
              >
                {t.label}
              </button>
            ))}
          </div>
          <div className="nav-status">
            <div className={`status-dot ${apiOnline===true?'online':''}`} />
            {apiOnline === true  ? 'Backend Online' :
             apiOnline === false ? 'Backend Offline' : 'Not checked'}
          </div>
        </nav>

        {/* PAGES */}
        {page === 'restaurant' && <RestaurantPage toast={toast} onApiStatus={setApiOnline} />}
        {page === 'ngo'        && <NgoPage        toast={toast} onApiStatus={setApiOnline} />}
        {page === 'admin'      && <AdminPage      toast={toast} onApiStatus={setApiOnline} />}

        {/* TOASTS */}
        <ToastZone toasts={toasts} />
      </>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
