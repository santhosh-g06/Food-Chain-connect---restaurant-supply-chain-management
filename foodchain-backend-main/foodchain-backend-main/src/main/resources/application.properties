spring.datasource.url=jdbc:postgresql://db.lryuakzotgwvjgzoiodq.supabase.co:5432/postgres?user=postgres&password=WZEjuUYRKS0Ntsvh
spring.datasource.username=postgres.lryuakzotgwvjgzoiodq
spring.datasource.password=WZEjuUYRKS0Ntsvh
spring.datasource.driver-class-name=org.postgresql.Driver

# --------------------------------------------------
# JPA / HIBERNATE SETTINGS
# ddl-auto=update → Hibernate auto-creates/updates tables on startup
# --------------------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# --------------------------------------------------
# SERVER PORT
# --------------------------------------------------
server.port=8080

# --------------------------------------------------
# CORS - Allow React frontend (dev)
# --------------------------------------------------
spring.web.cors.allowed-origins=http://localhost:3000
